name: Crons

# POR QUE ESTO EXISTE
#
# Los crons viven en vercel.json, pero el plan Hobby de Vercel solo permite
# ejecutarlos UNA VEZ POR DIA (cualquier expresion mas frecuente falla el deploy).
# Eso degrado el sistema en silencio: el circuit-breaker -- el que pausa un vault
# cuando el Brier se deteriora -- paso de correr cada 6h a una vez al dia. Con
# capital real adentro, un bot puede sangrar 24h antes de que salte.
#
# Este workflow le pega a los mismos endpoints desde GitHub Actions (gratis, sin
# limite de frecuencia) y restaura las frecuencias reales.
#
# Los crons de vercel.json SE QUEDAN a proposito: son el piso diario garantizado.
# Si este workflow se rompe o falta el secret, seguis como hoy (diario) en vez de
# quedarte sin crons. Todos los endpoints son idempotentes (score hace upsert por
# (botId, snapshotDate)), asi que una corrida doble no duplica nada.
#
# SETUP (una sola vez):
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     CRON_SECRET  = el mismo valor que tenes en las env vars de Vercel
#     APP_URL      = https://brier-protocol.vercel.app   (o el dominio final)

on:
  schedule:
    # NOTA: el scheduler de GitHub es best-effort; puede atrasarse algunos minutos.
    # Los umbrales de CRITICAL_CRONS en src/lib/observability.ts ya tienen margen.
    - cron: '*/30 * * * *'   # resolve-and-score: resolver predicciones
    - cron: '15 * * * *'     # score: recalcular Brier
    - cron: '45 */6 * * *'   # circuit-breaker: pausar vaults que se deterioran
    - cron: '0 6 * * *'      # sync + anchor + snapshot (diarios)
  workflow_dispatch:         # permite dispararlo a mano desde la UI de Actions

permissions:
  contents: read

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar que los secrets existan
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$APP_URL" ]; then
            echo "::error::Faltan los secrets CRON_SECRET y/o APP_URL. Ver el header de este archivo."
            exit 1
          fi

      - name: Disparar los endpoints que tocan en este horario
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -uo pipefail

          # Mapea el cron que disparo -> endpoints a llamar.
          # En workflow_dispatch (SCHEDULE vacio) corre todos, para poder probar.
          case "$SCHEDULE" in
            '*/30 * * * *') JOBS="resolve-and-score" ;;
            '15 * * * *')   JOBS="score" ;;
            '45 */6 * * *') JOBS="circuit-breaker" ;;
            '0 6 * * *')    JOBS="sync anchor-commitments snapshot-equity" ;;
            *)              JOBS="resolve-and-score score circuit-breaker sync anchor-commitments snapshot-equity" ;;
          esac

          failed=0
          for job in $JOBS; do
            echo "--- POST /api/cron/$job"
            code=$(curl -sS -o /tmp/out.txt -w '%{http_code}' --max-time 120 \
                     -H "Authorization: Bearer $CRON_SECRET" \
                     "$APP_URL/api/cron/$job") || code="000"
            echo "HTTP $code"
            head -c 500 /tmp/out.txt; echo
            # 000 = curl fallo (timeout/red). Cualquier no-2xx tambien es error.
            if [ "$code" -lt 200 ] 2>/dev/null || [ "$code" -ge 300 ] 2>/dev/null; then
              echo "::error::/api/cron/$job devolvio HTTP $code"
              failed=1
            fi
          done
          exit $failed
