name: CI

# Corre en cada Pull Request hacia dev o main.
# Si algo de esto falla, GitHub bloquea el merge (con branch protection activado).
#
# TAMBIEN corre en push directo a dev/main: si alguien saltea el PR, el commit
# queda marcado en rojo ANTES de que Vercel lo mande a produccion. Sin esto, el
# CI nunca llego a correr sobre los ~40 commits que entraron directo a main.
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# Un push nuevo cancela el run viejo de la misma rama (no acumular colas).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo to build/test.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # legacy-peer-deps ya está en .npmrc (conflicto rainbowkit <-> wagmi v3)
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Scoring engine tests
        run: npm run test:scoring

      - name: Smart-contract tests
        run: npm run test:contracts

      - name: Production build
        run: npm run build
