<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <style>
    .swirl{transform-box:view-box;transform-origin:24px 24px;animation:spin 16s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tw{transform-box:fill-box;transform-origin:center;animation:tw 2s ease-in-out infinite}
    @keyframes tw{0%,100%{opacity:.25;transform:scale(.6)}50%{opacity:1;transform:scale(1.3)}}
  </style>
  <defs>
    <radialGradient id="ora" cx=".5" cy=".42" r=".62">
      <stop offset="0" stop-color="#FF7BE5"/>
      <stop offset=".4" stop-color="#9D4EDD"/>
      <stop offset=".75" stop-color="#2EE6A6"/>
      <stop offset="1" stop-color="#241048"/>
    </radialGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#fff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cl"><polygon points="24,3 43,24 24,46 5,24"/></clipPath>
  </defs>
  <polygon points="24,3 43,24 24,46 5,24" fill="url(#ora)" stroke="#e7c8ff" stroke-width="1.1"/>
  <g class="swirl">
    <path d="M24 24 q7 -3 5 -10 q-1 -7 -11 -6" fill="none" stroke="#FF6FE0" stroke-width="1.6" opacity=".9"/>
    <path d="M24 24 q-7 3 -5 10 q1 7 11 6" fill="none" stroke="#54F0B8" stroke-width="1.6" opacity=".9"/>
  </g>
  <circle cx="24" cy="24" r="2.4" fill="#fff"/>
  <line x1="24" y1="3" x2="24" y2="46" stroke="#e7c8ff" stroke-width=".5" opacity=".4"/>
  <line x1="5" y1="24" x2="43" y2="24" stroke="#e7c8ff" stroke-width=".5" opacity=".4"/>
  <g clip-path="url(#cl)"><rect class="glint" style="animation-delay:0s" x="13" y="-8" width="10" height="62" fill="url(#gl)"/></g>
  <path class="tw" style="animation-delay:0s"   d="M13 11.6 l0.72 1.68 1.68 0.72 -1.68 0.72 -0.72 1.68 -0.72 -1.68 -1.68 -0.72 1.68 -0.72z" fill="#fff"/>
  <path class="tw" style="animation-delay:.6s"  d="M34 28 l0.6 1.4 1.4 0.6 -1.4 0.6 -0.6 1.4 -0.6 -1.4 -1.4 -0.6 1.4 -0.6z" fill="#fff"/>
  <path class="tw" style="animation-delay:1.1s" d="M31 10.4 l0.48 1.12 1.12 0.48 -1.12 0.48 -0.48 1.12 -0.48 -1.12 -1.12 -0.48 1.12 -0.48z" fill="#fff"/>
  <path class="tw" style="animation-delay:.3s"  d="M16 31.4 l0.48 1.12 1.12 0.48 -1.12 0.48 -0.48 1.12 -0.48 -1.12 -1.12 -0.48 1.12 -0.48z" fill="#fff"/>
</svg>
