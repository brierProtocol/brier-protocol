<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <style>
    .flame{transform-box:fill-box;transform-origin:bottom center;animation:flame .55s ease-in-out infinite alternate}
    @keyframes flame{0%{transform:scaleY(1) skewX(0);opacity:.85}100%{transform:scaleY(1.2) skewX(7deg);opacity:1}}
    .fl{animation-duration:.47s}
    .fr{animation-duration:.62s}
    .tw{transform-box:fill-box;transform-origin:center;animation:tw 2s ease-in-out infinite}
    @keyframes tw{0%,100%{opacity:.25;transform:scale(.6)}50%{opacity:1;transform:scale(1.3)}}
  </style>
  <defs>
    <linearGradient id="emb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE45C"/>
      <stop offset=".45" stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#B11A00"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#fff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cl"><polygon points="24,10 36,20 32,40 24,46 16,40 12,20"/></clipPath>
  </defs>
  <polygon class="fr flame" points="24,2 28,9 33,5 31,13 39,12 33,18" fill="#FFB347" opacity=".9"/>
  <polygon class="fl flame" points="24,2 20,9 15,5 17,13 9,12 15,18" fill="#FF7A00" opacity=".9"/>
  <polygon points="24,10 36,20 32,40 24,46 16,40 12,20" fill="url(#emb)" stroke="#ffd28a" stroke-width="1.1"/>
  <path class="flame" d="M24 16 q5 8 1 16 q-1 4 -5 6 q4 -7 0 -12 q-2 -5 4 -10z" fill="#FFE45C" opacity=".7"/>
  <g clip-path="url(#cl)"><rect style="animation-delay:.9s" x="13" y="-8" width="10" height="62" fill="url(#gl)"/></g>
  <path class="tw" style="animation-delay:.4s" d="M30 11.4 l0.78 1.82 1.82 0.78 -1.82 0.78 -0.78 1.82 -0.78 -1.82 -1.82 -0.78 1.82 -0.78z" fill="#fff"/>
</svg>
