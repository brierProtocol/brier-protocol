[build]
builder = "NIXPACKS"
watchEdges = [
  "brier-executor/**"
]

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "3001"

[phases.setup]
nixPkgs = ["nodejs_20", "redis"]

[phases.install]
cmds = [
  "cd brier-executor && npm install"
]

[phases.build]
cmds = [
  "cd brier-executor && npm run build"
]

[phases.start]
cmds = [
  "cd brier-executor && npm start"
]
