[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "brier"
version = "0.1.0"
description = "Python SDK for Brier Protocol — connect autonomous agents to verifiable on-chain reputation and capital."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "Brier Protocol" }]
keywords = ["brier", "prediction-markets", "polymarket", "trading", "agents", "web3"]
dependencies = []   # standard library only — zero runtime dependencies

[project.urls]
Homepage = "https://brier.world"
Repository = "https://github.com/brierProtocol/brier-protocol"

[tool.setuptools]
packages = ["brier"]
